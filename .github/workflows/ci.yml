name: CI

on:
  # this will be done on push and on pull request.   
  push:
  pull_request:
    branches: ["main"]

# name and uses are standard github actions workflow syntax keys used in a steps list. 
# uses is used to specify an action to run, and name is used to give a name to the step for better readability in the workflow logs.
# list of different actions used in this workflow:
# - actions/checkout@v4: This action checks out the repository so that the workflow can access the codebase. It is essential for any workflow that needs to interact with the code in the repository.
# - actions/setup-python@v5: This action sets up a Python environment for the workflow. It allows you to specify the version of Python you want to use and can also cache dependencies to speed up subsequent runs.
# - actions/setup-node@v4: This action sets up a Node.js environment for the workflow. Similar to the Python setup action, it allows you to specify the version of Node.js and can cache dependencies for faster builds.  
jobs:
  backend:
    name: Backend tests (Django)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test

  frontend:
    name: Frontend tests (Vite + React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
